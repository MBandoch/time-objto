services:
  sync-server:
    build: ./server
    container_name: objto-sync
    ports:
      - "3001:3001"
    volumes:
      - objto-data:/data
    environment:
      PORT: 3001
      AUTH_TOKEN: ${AUTH_TOKEN:-}        # set in .env or leave empty for dev
      DB_PATH: /data/tracker.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  objto-data:
    driver: local
