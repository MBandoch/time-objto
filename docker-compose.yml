services:
  sync-server:
    build: ./server
    container_name: objto-sync
    ports:
      - "${PORT:-3001}:${PORT:-3001}"
    volumes:
      - objto-data:/data
    environment:
      PORT: ${PORT:-3001}
      DB_PATH: /data/tracker.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:' + (process.env.PORT||3001) + '/health', r => process.exit(r.statusCode===200?0:1))"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  objto-data:
    driver: local
