services:
  server:
    build: ./server
    container_name: objto-server
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    environment:
      - PORT=3001
      - DB_PATH=/data/objto.db
    volumes:
      - ./dist:/app/public:ro      # SPA (rode `npm run build` antes)
      - objto-data:/data           # banco SQLite persistente
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', r => process.exit(r.statusCode===200?0:1))"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  objto-data:
    driver: local
